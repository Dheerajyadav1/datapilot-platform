version: 2

models:

  - name: dim_customers
    description: Customer dimension table

    columns:

      - name: customer_id
        tests:
          - unique
          - not_null

      - name: customer_unique_id
        tests:
          - not_null

  - name: dim_products
    description: Product dimension table

    columns:

      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_sellers
    description: Seller dimension table

    columns:

      - name: seller_id
        tests:
          - unique
          - not_null

  - name: fact_sales
    description: Sales fact table

    columns:

      - name: order_id
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: seller_id
        tests:
          - not_null

      - name: payment_value
        tests:
          - not_null

  - name: fact_weather
    description: Weather fact table

    columns:

      - name: time
        tests:
          - unique
          - not_null

  - name: sales_summary
    description: Daily sales summary

    columns:

      - name: sales_date
        tests:
          - unique
          - not_null
x-airflow-common: &airflow-common

  build:
    context: .
    dockerfile: docker/airflow/Dockerfile

  user: "${AIRFLOW_UID}:0"

  restart: unless-stopped

  env_file:
    - .env

  environment:

    POSTGRES_HOST: postgres

    AIRFLOW_HOME: /opt/airflow

    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    AIRFLOW__CORE__LOAD_EXAMPLES: "False"

    AIRFLOW__WEBSERVER__SECRET_KEY: agentic-secret-key

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB}

  volumes:

    - ./:/opt/airflow/project

    - ./dags:/opt/airflow/dags

    - airflow_logs:/opt/airflow/logs

  depends_on:

    postgres:
      condition: service_healthy

  networks:
    - platform-network


services:

###############################################################
# PostgreSQL
###############################################################

  postgres:

    image: pgvector/pgvector:pg17

    container_name: agentic-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - platform-network


###############################################################
# pgAdmin
###############################################################

  pgadmin:

    image: dpage/pgadmin4:9.11

    container_name: agentic-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - platform-network


###############################################################
# Airflow Init
###############################################################


  airflow-init:

    <<: *airflow-common

    container_name: airflow-init

    restart: "no"

    command: bash /opt/airflow/project/docker/airflow/init_airflow.sh


###############################################################
# Airflow Scheduler
###############################################################

  airflow-scheduler:

    <<: *airflow-common

    container_name: airflow-scheduler

    depends_on:
      postgres:
        condition: service_healthy

      airflow-init:
        condition: service_completed_successfully

    command: scheduler


###############################################################
# Airflow Webserver
###############################################################

  airflow-webserver:

    <<: *airflow-common

    container_name: airflow-webserver

    depends_on:
      postgres:
        condition: service_healthy

      airflow-init:
        condition: service_completed_successfully

    command: webserver

    ports:
      - "8080:8080"

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5


###############################################################
# Networks
###############################################################

networks:

  platform-network:
    driver: bridge


###############################################################
# Volumes
###############################################################

volumes:

  postgres_data:

  pgadmin_data:

  airflow_logs:
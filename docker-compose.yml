services:

  # PostgreSQL Warehouse with pgvector extension
  postgres:
    image: pgvector/pgvector:pg17
    container_name: agentic-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      # Persist PostgreSQL data
      - postgres_data:/var/lib/postgresql/data

      # Execute initialization SQL scripts
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - platform-network

  # pgAdmin for PostgreSQL administration
  pgadmin:
    image: dpage/pgadmin4:9.11
    container_name: agentic-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    ports:
      - "5050:80"

    volumes:
      # Persist pgAdmin configuration
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

  pgadmin_data:
    driver: local